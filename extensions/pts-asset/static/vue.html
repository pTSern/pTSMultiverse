<div class="counter">
    <h2>{{counter}}</h2>
    <ui-button class="blue" @click="addition">+</ui-button>
    <ui-button @click="subtraction">-</ui-button>
    <ui-input
        @change="onChange($event.target, 1)"
        @confirm="onConfirm($event.target, 2)"
        @cancel="onCancel($event.target, 3)"
    ></ui-input>
</div>
